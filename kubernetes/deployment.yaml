apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: sentinel-trading
  labels:
    app: celery-worker
    tier: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
        tier: worker
    spec:
      containers:
      - name: celery-worker
        image: sentinel-trading/celery-worker:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: sentinel-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: sentinel-config
              key: REDIS_URL
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: sentinel-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: sentinel-config
              key: REDIS_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: sentinel-config
              key: REDIS_URL
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: sentinel-secrets
              key: SENTRY_DSN
        command: ["celery", "-A", "app.infrastructure.celery_app", "worker", "--loglevel=info"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

# Render — Sentinel Trading
#
# Orden: Redis (Key Value) primero; el API y los workers referencian connectionString.
#
# Workers Celery: en el dashboard, replica en worker Y beat las variables del API
# (SECRET_KEY, DATABASE_URL, MAIL_*, REGISTRO_CITA_*, etc.).
# Importante: Celery Beat arma el horario al ARRANCAR leyendo el .env del proceso beat;
# hace falta REGISTRO_CITA_URL (y opcionalmente REGISTRO_CITA_BEAT_*) en sentinel-celery-beat
# para que exista la tarea periódica. El worker que ejecuta Playwright necesita las mismas REGISTRO_*.
#
# Logs: Dashboard → cada servicio → pestaña "Logs" (worker, beat y API por separado).
#
# RAM: Playwright + Celery con concurrency>1 en Starter (512MB) suele OOM. Usa --concurrency=1
# y/o plan Standard (2GB). En el worker define REGISTRO_CITA_NO_SANDBOX=true si Chromium falla al arrancar.
#
# Playwright: PLAYWRIGHT_BROWSERS_PATH=0 instala Chromium dentro del site-packages
# (incluido en el slug). Sin esto, los binarios quedan en ~/.cache y en runtime no existen.

services:

  # --- Redis (broker + resultados Celery) ---
  - type: keyvalue
    name: sentinel-celery-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # --- Backend API ---
  - type: web
    name: sentinel-trading-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          name: sentinel-celery-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sentinel-celery-redis
          type: keyvalue
          property: connectionString
      - key: SUPABASE_URL
        value: https://dqfuuycnzhqatkiwcecf.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://sentineltrading.onrender.com,http://localhost:5173
      - key: SQL_DEBUG
        value: false

  # --- Celery worker (ejecuta tareas) ---
  - type: worker
    name: sentinel-celery-worker
    runtime: python
    plan: starter
    rootDir: backend
    # Misma variable en build y runtime: sin 0, Playwright busca en ~/.cache (no persiste en el slug).
    buildCommand: export PLAYWRIGHT_BROWSERS_PATH=0 && pip install -r requirements.txt && playwright install chromium chromium-headless-shell
    # Escuchar todas las colas que usa Beat (si solo "celery", market_data/predictions/… nunca se ejecutan).
    startCommand: PLAYWRIGHT_BROWSERS_PATH=0 celery -A app.infrastructure.celery_app worker --loglevel=info --concurrency=1 -Q celery,market_data,predictions,evaluations,news,maintenance,monitoring
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: REGISTRO_CITA_NO_SANDBOX
        value: "true"
      # Mismos valores que en el API / .env local (sync: false = rellenar en el dashboard).
      - key: REGISTRO_CITA_URL
        sync: false
      - key: REGISTRO_CITA_NIE
        sync: false
      - key: REGISTRO_CITA_NOMBRE
        sync: false
      - key: REGISTRO_CITA_PAIS
        sync: false
      - key: REGISTRO_CITA_MAIL_TO
        sync: false
      # Mismas variables que en sentinel-trading-api; sin ellas el worker no puede enviar informes.
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USE_SSL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          name: sentinel-celery-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sentinel-celery-redis
          type: keyvalue
          property: connectionString
      - key: FLASK_ENV
        value: production

  # --- Celery Beat (programación periódica; no necesita Playwright) ---
  - type: worker
    name: sentinel-celery-beat
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.infrastructure.celery_app beat --loglevel=info
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          name: sentinel-celery-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sentinel-celery-redis
          type: keyvalue
          property: connectionString
      - key: FLASK_ENV
        value: production
      # Obligatorio para que exista registro-cita-periodic (se decide al arrancar beat).
      - key: REGISTRO_CITA_URL
        sync: false
      - key: REGISTRO_CITA_BEAT_INTERVAL_MINUTES
        value: "5"
      - key: REGISTRO_CITA_BEAT_ENABLED
        sync: false

  # --- Frontend (estático) ---
  - type: web
    name: sentinel-trading-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /-
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sentinel-trading-api.onrender.com/api

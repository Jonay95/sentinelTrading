# Render Configuration for Sentinel Trading

services:

# Backend API Service

- type: web
  name: sentinel-trading-api
  env: python
  plan: free
  rootDir: backend
  buildCommand: pip install -r requirements.txt
  startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
  healthCheckPath: /api/health
  envVars:

  - key: SUPABASE_URL
    value: https://dqfuuycnzhqatkiwcecf.supabase.co
  - key: SUPABASE_ANON_KEY
    value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  - key: SECRET_KEY
    generateValue: true
  - key: FLASK_ENV
    value: production
  - key: SQL_DEBUG
    value: false

# Frontend Service (Static Site)

- type: web
  name: sentinel-trading-frontend
  runtime: static
  plan: free
  rootDir: frontend
  buildCommand: npm install && npm run build
  staticPublishPath: dist
  routes:

  - type: rewrite
    source: /-
    destination: /index.html
  envVars:
  - key: VITE_API_URL
    value: https://sentinel-trading-api.onrender.com/api
